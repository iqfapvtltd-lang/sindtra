<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Information Form</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; margin: 20px; }
        .form-container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="url"] { width: 95%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { display: block; width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #218838; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Detailed Business Information</h2>
        <p>Provide your detailed business information. This will be linked to your seller profile.</p>
        <form id="businessForm">
            <!-- These fields are from the business_information table -->
            <div class="form-group">
                <label for="business_name">Official Business Name</label>
                <input type="text" id="business_name" name="business_name" placeholder="e.g., Acme Innovations Pvt. Ltd." required>
            </div>
            <div class="form-group">
                <label for="seller_name">Your Full Name (Seller Name)</label>
                <input type="text" id="seller_name" name="seller_name" placeholder="e.g., John Doe" required>
            </div>
            <div class="form-group">
                <label for="pan_card">PAN Card Number</label>
                <input type="text" id="pan_card" name="pan_card" required>
            </div>
            <div class="form-group">
                <label for="gstin_no">GSTIN Number (Optional)</label>
                <input type="text" id="gstin_no" name="gstin_no">
            </div>
            <div class="form-group">
                <label for="address">Full Business Address</label>
                <input type="text" id="address" name="address" required>
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" required>
            </div>
            <div class="form-group">
                <label for="pin_code">Pin Code</label>
                <input type="text" id="pin_code" name="pin_code" required>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" value="India" required>
            </div>
            <div class="form-group">
                <label for="website_url">Website URL (Optional)</label>
                <input type="url" id="website_url" name="website_url" placeholder="https://www.example.com">
            </div>
            <button type="submit" class="btn">Save Business Information</button>
        </form>
        <div id="message"></div>
    </div>

     <script>
        document.getElementById('businessForm').addEventListener('submit', async function(event) {
            // Prevent the default form submission (page reload)
            event.preventDefault();

            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'Saving...';
            messageDiv.style.color = 'blue';

            // 1. Get the Firebase ID Token from localStorage
            const token = localStorage.getItem('firebaseIdToken');
            if (!token) {
                messageDiv.textContent = 'Error: You are not logged in! Please log in first.';
                messageDiv.style.color = 'red';
                // Optional: Redirect to login page
                // window.location.href = '/public/login.html';
                return;
            }

            // 2. Create a data object from the form
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            console.log('Submitting to API:', data);

            try {
                // 3. Send the actual API request to the backend
                const response = await fetch('/api/sellers/business-information', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Attach the token for authentication
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    // If the server returns an error (like 400, 401, 500), show it
                    throw new Error(result.details || result.error || 'An unknown error occurred.');
                }

                // 4. Show success message and clear the form
                messageDiv.textContent = 'Business information saved successfully!';
                messageDiv.style.color = 'green';
                console.log('Server response:', result);
                this.reset();

            } catch (error) {
                // 5. Show any error that occurred during the fetch
                messageDiv.textContent = `Error: ${error.message}`;
                messageDiv.style.color = 'red';
                console.error('Submission error:', error);
            }
        });
    </script>
</body>
</html>
